name: Build and Release

on:
  push:
    branches:
      - main    # 推送到 main 分支时触发
    tags:
      - 'v*'    # 推送标签时也触发

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Build fins (CLI)
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o dist/fins-${{ matrix.goos }}-${{ matrix.goarch }} cmd/fins/main.go

      - name: Build finsd (Daemon)
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o dist/finsd-${{ matrix.goos }}-${{ matrix.goarch }} cmd/finsd/main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 动态设置标签名：如果是标签推送就用标签名，否则用 "latest"
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          files: |
            fins-linux-amd64
            fins-linux-arm64
            finsd-linux-amd64
            finsd-linux-arm64
          generate_release_notes: true
          fail_on_unmatched_files: true
          # 如果是推送 main 分支，标记为预发布或强制覆盖
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}