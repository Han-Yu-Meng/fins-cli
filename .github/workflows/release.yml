name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Build fins (CLI)
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w" -o dist/fins-${{ matrix.goos }}-${{ matrix.goarch }} cmd/fins/main.go

      - name: Build finsd (Daemon)
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w" -o dist/finsd-${{ matrix.goos }}-${{ matrix.goarch }} cmd/finsd/main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 显式声明权限
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: ls files
        run: ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 显式传递 TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}
          # 修改为确切的文件名，避免通配符解析失败
          files: |
            fins-linux-amd64
            fins-linux-arm64
            finsd-linux-amd64
            finsd-linux-arm64
          generate_release_notes: true
          # 强制如果找不到文件就报错，方便我们排查
          fail_on_unmatched_files: true
          draft: false
          prerelease: false